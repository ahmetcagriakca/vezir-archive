# Budget Enforcement Policy Rules — D-139 / B-138
# Status: DRAFT (design-only, S63)
# Implementation: S64 (B-140)
#
# Evaluated by PolicyEngine.evaluate() before each stage.
# Controller accumulates token count; PolicyEngine evaluates.

rules:
  - name: budget_exceeded
    description: Deny mission when cumulative tokens exceed budget
    condition:
      field: totalTokens
      operator: gte
      value_field: maxTokenBudget
    decision: deny
    reason: "Mission token budget exceeded: {totalTokens}/{maxTokenBudget}"
    priority: 1

  - name: budget_warning_80pct
    description: Alert when mission reaches 80% of token budget
    condition:
      field: totalTokens
      operator: gte
      value_expression: "maxTokenBudget * 0.8"
    decision: allow
    action: alert
    alert_rule: budget_warning
    reason: "Mission approaching budget limit: {totalTokens}/{maxTokenBudget} (80%)"
    priority: 10

# Default budgets per complexity tier
defaults:
  trivial: 50000
  standard: 200000
  complex: 500000
  critical: 1000000
