  automation_index: "plan.yaml"
  generated_files:
    - "issues.json"
  not_generated:
    - "SPRINT-26-TASK-BREAKDOWN.md"
    - "plan.yaml"

issue:
  parent_title: "[S26] Foundation Hardening — Dev Runtime + Contract Guards + Live E2E"
  labels: ["sprint", "phase-6"]
  milestone: "Sprint 26"

tasks:
  - id: "26.1"
    title: "Backend restructure freeze pack"
    type: "implementation"
    track: 1
    branch_name: "sprint-26/t26.1-restructure-plan"
    labels: ["docs", "architecture"]

  - id: "26.2"
    title: "Docker dev environment baseline"
    type: "implementation"
    track: 1
    branch_name: "sprint-26/t26.2-docker-dev"
    labels: ["infra", "docker"]

  - id: "26.G1"
    title: "Mid Review Gate"
    type: "gate"
    branch_exempt: true
    blocks: ["26.3", "26.4", "26.5"]
    labels: ["gate"]

  - id: "26.3"
    title: "SDK drift detection CI gate"
    type: "implementation"
    track: 2
    branch_name: "sprint-26/t26.3-sdk-drift"
    labels: ["ci", "frontend"]
    depends_on: ["26.G1"]

  - id: "26.4"
    title: "Live mission E2E baseline"
    type: "implementation"
    track: 2
    branch_name: "sprint-26/t26.4-live-mission-e2e"
    labels: ["e2e", "testing"]
    depends_on: ["26.G1"]

  - id: "26.5"
    title: "Frontend component test expansion"
    type: "implementation"
    track: 2
    branch_name: "sprint-26/t26.5-component-tests"
    labels: ["frontend", "testing"]
    depends_on: ["26.G1"]

  - id: "26.G2"
    title: "Final Review Gate"
    type: "gate"
    branch_exempt: true
    labels: ["gate"]

  - id: "26.RETRO"
    title: "Retrospective"
    type: "gate"
    branch_exempt: true
    labels: ["process"]

  - id: "26.CLOSURE"
    title: "Sprint Closure"
    type: "gate"
    branch_exempt: true
    labels: ["process"]

validation:
  require_doc_sync: true
  fail_on_conflict: true
