sprint: 21
phase: 6
title: "Closure + Archive Automation"
model: "A"

authority:
  source_of_truth: "SPRINT-21-TASK-BREAKDOWN.md"
  automation_index: "plan.yaml"
  generated_files:
    - "issues.json"
  not_generated:
    - "SPRINT-21-TASK-BREAKDOWN.md"
    - "plan.yaml"

issue:
  parent_title: "[S21] Closure + Archive Automation"
  labels: ["sprint", "phase-6", "automation"]
  milestone: "Sprint 21"

tasks:
  - id: "21.1"
    title: "Review packet generator"
    type: "implementation"
    track: 1
    branch_name: "sprint-21/t21.1-plan-schema"
    labels: ["automation", "tooling"]

  - id: "21.2"
    title: "Stale ref grep automation"
    type: "implementation"
    track: 1
    branch_name: "sprint-21/t21.2-stale-refs"
    labels: ["automation", "tooling"]

  - id: "21.3"
    title: "Archive manifest generator"
    type: "implementation"
    track: 2
    branch_name: "sprint-21/t21.3-archive-manifest"
    labels: ["automation", "tooling"]

  - id: "21.4"
    title: "Closure preflight workflow"
    type: "implementation"
    track: 2
    branch_name: "sprint-21/t21.4-closure-preflight"
    labels: ["automation", "github-actions"]

  - id: "21.5"
    title: "Merged-state-only closure check"
    type: "implementation"
    track: 3
    branch_name: "sprint-21/t21.5-merged-state-check"
    labels: ["automation", "tooling"]

  - id: "21.6"
    title: "Branch cleanup automation"
    type: "implementation"
    track: 3
    branch_name: "sprint-21/t21.6-branch-cleanup"
    labels: ["automation", "tooling"]

  - id: "21.G1"
    title: "Mid Review Gate"
    type: "gate"
    branch_exempt: true
    blocks: ["21.5", "21.6"]
    labels: ["gate"]

  - id: "21.G2"
    title: "Final Review Gate"
    type: "gate"
    branch_exempt: true
    labels: ["gate"]

  - id: "21.RETRO"
    title: "Retrospective"
    type: "gate"
    branch_exempt: true
    labels: ["process"]

  - id: "21.CLOSURE"
    title: "Sprint Closure"
    type: "gate"
    branch_exempt: true
    labels: ["process"]

validation:
  require_doc_sync: true
  fail_on_conflict: true
