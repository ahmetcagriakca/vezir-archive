sprint: 30
phase: 7
title: "Repeatable Automation Core — Templates + Timeline + Approval + Guardrails"
model: "A"

authority:
  source_of_truth: "SPRINT-30-TASK-BREAKDOWN.md"
  automation_index: "plan.yaml"
  generated_files:
    - "issues.json"

issue:
  parent_title: "[S30] Repeatable Automation Core"
  labels: ["sprint", "phase-7"]
  milestone: "Sprint 30"

tasks:
  - id: "30.1"
    title: "Phase 7 workflow decision pack freeze"
    type: "implementation"
    track: 1
    branch_name: "sprint-30/t30.1-workflow-decisions"
    labels: ["docs", "architecture"]

  - id: "30.2"
    title: "Mission Templates v1"
    type: "implementation"
    track: 1
    branch_name: "sprint-30/t30.2-mission-templates"
    labels: ["feature", "templates"]
    depends_on: ["30.1"]

  - id: "30.G1"
    title: "Mid Review Gate"
    type: "gate"
    branch_exempt: true
    blocks: ["30.3", "30.4", "30.5"]
    labels: ["gate"]

  - id: "30.3"
    title: "Mission Timeline / Run Detail UI v1"
    type: "implementation"
    track: 2
    branch_name: "sprint-30/t30.3-mission-timeline"
    labels: ["frontend", "feature"]
    depends_on: ["30.G1"]

  - id: "30.4"
    title: "Approval Inbox v1"
    type: "implementation"
    track: 2
    branch_name: "sprint-30/t30.4-approval-inbox"
    labels: ["feature", "auth"]
    depends_on: ["30.G1"]

  - id: "30.5"
    title: "Tenant Guardrails baseline"
    type: "implementation"
    track: 2
    branch_name: "sprint-30/t30.5-guardrails"
    labels: ["feature", "security"]
    depends_on: ["30.G1"]

  - id: "30.G2"
    title: "Final Review Gate"
    type: "gate"
    branch_exempt: true
    labels: ["gate"]

  - id: "30.RETRO"
    title: "Retrospective"
    type: "gate"
    branch_exempt: true
    labels: ["process"]

  - id: "30.CLOSURE"
    title: "Sprint Closure"
    type: "gate"
    branch_exempt: true
    labels: ["process"]

validation:
  require_doc_sync: true
  fail_on_conflict: true
