    type: "implementation"
    track: 4
    branch_name: "sprint-19/t19.7-governance"
    labels: ["process", "docs"]

  - id: "19.G1"
    title: "Mid Review Gate"
    type: "gate"
    branch_exempt: true
    blocks: ["19.5", "19.6", "19.7"]
    labels: ["gate"]

  - id: "19.G2"
    title: "Final Review Gate"
    type: "gate"
    branch_exempt: true
    labels: ["gate"]

  - id: "19.RETRO"
    title: "Retrospective"
    type: "gate"
    branch_exempt: true
    labels: ["process"]

  - id: "19.CLOSURE"
    title: "Sprint Closure"
    type: "gate"
    branch_exempt: true
    labels: ["process"]

validation:
  require_doc_sync: true
  fail_on_conflict: true
