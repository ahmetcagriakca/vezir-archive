    type: "implementation"
    track: 1
    branch_name: "sprint-19/t19.1-plan-schema"
    labels: ["automation", "foundation"]

  - id: "19.2"
    title: "plan.yaml task breakdown validator"
    type: "implementation"
    track: 1
    branch_name: "sprint-19/t19.2-validator"
    labels: ["automation", "tooling"]
    depends_on: ["19.1"]

  - id: "19.3"
    title: "issue-from-plan.yml workflow"
    type: "implementation"
    track: 2
    branch_name: "sprint-19/t19.3-issue-workflow"
    labels: ["automation", "github-actions"]
    depends_on: ["19.1"]

  - id: "19.4"
    title: "issues.json schema and mapping"
    type: "implementation"
    track: 2
    branch_name: null
    labels: ["automation"]
    co_delivered_with: "19.3"

  - id: "19.5"
    title: "Branch naming contract and check script"
    type: "implementation"
    track: 3
    branch_name: "sprint-19/t19.5-branch-contract"
    labels: ["process", "tooling"]

  - id: "19.6"
    title: "main protection verification"
    type: "implementation"
    track: 3
    branch_name: "sprint-19/t19.6-protection-verify"
